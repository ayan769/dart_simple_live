name: 编译 dart_simple_live
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 项目需要的最新稳定版 Flutter
      - name: 安装 Flutter 3.27.12
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.12'
          channel: stable

      # 🔥 强制修复 intl 版本冲突（核心解决）
      - name: 修复依赖版本
        run: |
          cd simple_live_app
          sed -i 's/intl: ^0.20.2/intl: 0.19.0/g' pubspec.yaml
          flutter pub get

      # 编译
      - name: 编译 Android APK
        run: |
          cd simple_live_app
          flutter build apk --release

      # 上传
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
