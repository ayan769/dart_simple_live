name: 编译 dart_simple_live
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 👈 关键：用更高版本 Flutter，解决 SDK 版本问题
      - name: 安装 Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      # 👈 修复依赖版本
      - name: 修复依赖并安装
        run: |
          cd simple_live_app
          flutter pub get

      # 👈 直接编译，跳过版本检查
      - name: 编译 Android APK
        run: |
          cd simple_live_app
          flutter build apk --release --no-version-check

      # 上传成果
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
