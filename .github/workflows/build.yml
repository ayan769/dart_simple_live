name: 编译 dart_simple_live
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable

      # 👇 这里加了强制降级 intl 版本，解决依赖冲突
      - name: 修复依赖并安装
        run: |
          cd simple_live_app
          flutter pub add intl:0.19.0
          flutter pub get

      - name: 编译 Android APK
        run: |
          cd simple_live_app
          flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
