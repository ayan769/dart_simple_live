name: 编译 dart_simple_live
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter 3.29.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: stable

      - name: 修复所有依赖
        run: |
          cd simple_live_app
          sed -i 's/intl: ^0.20.2/intl: 0.19.0/' pubspec.yaml
          flutter pub get --skip-null-safety --force

      - name: 编译 APK
        run: |
          cd simple_live_app
          flutter build apk --release --no-sound-null-safety

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
