name: 编译 dart_simple_live
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 最新稳定版，解决 Dart SDK 版本过低问题
      - name: 安装 Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      # 🔥 一次性修复所有依赖冲突
      - name: 修复依赖冲突
        run: |
          cd simple_live_app
          sed -i 's/intl: ^0.20.2/intl: 0.19.0/' pubspec.yaml
          sed -i 's/image_gallery_saver_plus: ^4.0.0+18/image_gallery_saver_plus: ^3.1.0/' pubspec.yaml
          flutter pub get

      # 编译
      - name: 编译 Android APK
        run: |
          cd simple_live_app
          flutter build apk --release

      # 上传成果
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
